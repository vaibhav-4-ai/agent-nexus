# Default configuration
app:
  name: agent-nexus
  version: 1.0.0

llm:
  provider: groq
  model: groq/llama-3.3-70b-versatile
  temperature: 0.1
  max_tokens: 4096
  max_retries: 3

memory:
  cag_max_tokens: 8000
  rag_chunk_size: 512
  rag_chunk_overlap: 50
  rag_top_k: 5
  episodic_top_k: 3

verification:
  confidence_threshold_pass: 0.8
  confidence_threshold_retry: 0.5
  max_retries: 3

mcp:
  shell_timeout: 30
  browser_enabled: false
  search_provider: duckduckgo
